[font]
size = 16.0
normal = { family = "FiraMono Nerd Font", style = "Regular"}
bold = { family = "FiraMono Nerd Font", style = "Bold"}
italic = { family = "FiraMono Nerd Font", style = "Italic"}


[keyboard]
bindings = [
  # cmd + enter puts window in macOS full screen
  #  { key = "Enter", mods = "Command", action = "ToggleFullscreen"},
  # jumps right or left between words
  { key = "Right", mods = "Alt", chars = "\u001BF" },
  { key = "Left",  mods = "Alt", chars = "\u001BB" },
  # MacOS
  { key = "Up",  mods = "Command", action = "ScrollToTop" },
  { key = "Down",  mods = "Command", action = "ScrollToBottom" },
  # Claude Code Added
  { key = "Return", mods = "Shift", chars = "\u001B\r"},
]

[scrolling]
history = 50000

[selection]
# adds forward slash
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t/"

